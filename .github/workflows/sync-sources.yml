name: Sync Sources

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile name, for example tvbox or jsm. Leave empty to sync all."
        required: false
        type: string
      upstream_url:
        description: "Optional temporary upstream URL override."
        required: false
        type: string
  schedule:
    - cron: "13 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync sources
        env:
          INPUT_PROFILE: ${{ inputs.profile }}
          INPUT_UPSTREAM_URL: ${{ inputs.upstream_url }}
        run: |
          set -eu
          if [ -n "${INPUT_PROFILE:-}" ]; then
            if [ -n "${INPUT_UPSTREAM_URL:-}" ]; then
              python3 tools/eggtv_sync.py --no-proxy sync "$INPUT_PROFILE" --upstream-url "$INPUT_UPSTREAM_URL"
            else
              python3 tools/eggtv_sync.py --no-proxy sync "$INPUT_PROFILE"
            fi
          else
            python3 tools/eggtv_sync.py --no-proxy sync --all
          fi

      - name: Commit changes
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eggtv_sync.json tvbox_config.json jsm_backup.json mirrors.json sync_report.md jar/spider.jar README.md tools/eggtv_sync.py .github/workflows/sync-sources.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(sync): refresh sources"
          git push
